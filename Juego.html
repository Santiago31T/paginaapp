<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Juego</title>
<style>
body{
    text-align:center;
    font-family:Arial;
    background:#222;
    color:white;
}
button{
    padding:15px 30px;
    font-size:20px;
    background:#00c6ff;
    border:none;
    border-radius:10px;
    cursor:pointer;
}
</style>
</head>
<body>

<h1>🎮 Juego de clics</h1>
<p>Haz clic en el botón y suma puntos</p>

<h2 id="score">0</h2>

<button onclick="sumar()">CLICK</button>

<br><br>
<a href="index.html" style="color:white;">⬅ Volver</a>

<script>
let puntos = 0;
function sumar(){
    puntos++;
    document.getElementById("score").innerText = puntos;
}
</script>

</body>
</html>
